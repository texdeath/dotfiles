name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dry-run install
        run: ./install.sh --dry-run

  boundary-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for internal keywords
        env:
          BOUNDARY_PATTERNS: ${{ secrets.BOUNDARY_PATTERNS }}
        run: |
          if [ -z "$BOUNDARY_PATTERNS" ]; then
            echo "⚠️  BOUNDARY_PATTERNS secret is not set, skipping keyword check"
            exit 0
          fi

          echo "=== Checking for internal/private keywords ==="
          errors=0
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            # docs/ と .github/ は除外
            matches=$(grep -r --include='*.sh' --include='*.zsh' --include='*.json' \
              --include='*.yml' --include='*.toml' --include='*.md' \
              -l "$pattern" . --exclude-dir=docs --exclude-dir=.github 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "❌ Pattern match found in:"
              echo "$matches" | sed 's/^/  /'
              errors=$((errors + 1))
            else
              echo "✓ Pattern clean"
            fi
          done <<< "$BOUNDARY_PATTERNS"

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "❌ Internal keywords detected in public files."
            echo "Move these to the private overlay repo or use placeholders."
            exit 1
          fi

          echo ""
          echo "✅ No internal keywords found"

      - name: Check for absolute paths
        run: |
          echo "=== Checking for hardcoded absolute paths ==="
          matches=$(grep -r '/Users/' . --include='*.sh' --include='*.zsh' \
            --include='*.json' --include='*.yml' --include='*.toml' --include='*.md' \
            --exclude-dir=docs --exclude-dir=.github 2>/dev/null || true)
          if [ -n "$matches" ]; then
            echo "❌ Absolute paths found:"
            echo "$matches" | sed 's/^/  /'
            exit 1
          fi
          echo "✅ No absolute paths found"
