# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes
unbind %
unbind '"'
unbind-key -q |
unbind-key -q -
bind h split-window -h
bind v split-window -v
bind s split-window -v

# Panes
unbind-key -q j
unbind-key -q k
unbind-key -q l
bind y setw synchronize-panes

# Prefix-free pane shortcuts
bind -n M-h split-window -h
bind -n M-v split-window -v
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R
# Some terminals send Option-Left/Right as M-b/M-f.
bind -n M-b select-pane -L
bind -n M-f select-pane -R
bind -n M-x confirm-before -p 'kill-pane #P? (y/n)' kill-pane
bind -n M-y setw synchronize-panes

# Forward Shift+Enter in the Kitty keyboard protocol form used by AI CLIs.
bind -n S-Enter send-keys Escape "[13;2u"

# Usability
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 2000
setw -g mode-keys vi

# Show a visual indicator while the prefix key is active.
set -g status-left '#{?client_prefix,#[reverse] PREFIX #[noreverse] ,}#S '
